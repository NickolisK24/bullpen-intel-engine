name: CI

# Runs the backend and frontend test suites on every push and pull request so
# the green state asserted in the docs is actually enforced. Kept intentionally
# simple: install, test. No deploy, no sync, no secrets required.

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        run: python -m pytest tests -q

  frontend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # The repository currently tracks a node_modules/ tree built on another
      # platform, and npm has a known optional-dependency bug that surfaces as
      # "Cannot find module @rollup/rollup-linux-x64-gnu". Removing the checked-in
      # install and the lockfile, then running a fresh `npm install` on the Linux
      # runner, regenerates the correct platform binaries reliably.
      - name: Clean checked-in install artifacts
        run: rm -rf node_modules package-lock.json

      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund

      - name: Run frontend tests
        run: npm test
