name: Daily Bullpen Sync

# Reliable production sync. GitHub Actions runs the daily sync as a direct
# Python process against the production database, then calls the protected
# dashboard snapshot endpoint. The protected backend sync endpoint remains
# available for manual emergency use, but scheduled automation does not run the
# large sync job inside a Render/Gunicorn web request.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   DATABASE_URL                production Postgres connection URL
#   SECRET_KEY                  production Flask secret key
#   BASEBALLOS_ADMIN_API_TOKEN  must match the backend's ADMIN_API_TOKEN
#   BASEBALLOS_SYNC_URL         e.g. https://baseballos-api.onrender.com/api/bullpen/sync
#   DASHBOARD_SNAPSHOT_BUILD_TOKEN must match the backend's DASHBOARD_SNAPSHOT_BUILD_TOKEN
#
# To disable: comment out the `schedule:` block below (manual runs still work
# via the "Run workflow" button), or disable this workflow in the Actions tab.

on:
  schedule:
    # Cron is always UTC and does NOT observe DST. 10:00 UTC is ~6 AM ET during
    # daylight time (most of the MLB season) and ~5 AM ET during standard time.
    - cron: '0 10 * * *'
  workflow_dispatch: {}   # allow manual runs from the Actions tab

# Never let scheduled + manual runs pile up on top of each other.
concurrency:
  group: baseballos-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run direct daily sync
        env:
          APP_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ADMIN_API_TOKEN: ${{ secrets.BASEBALLOS_ADMIN_API_TOKEN }}
          AUTO_SYNC: 'false'
          FOUR_BEAT_STORIES_ENABLED: 'true'
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ] || [ -z "${SECRET_KEY:-}" ] || [ -z "${ADMIN_API_TOKEN:-}" ]; then
            echo "::error::Missing DATABASE_URL, SECRET_KEY, or BASEBALLOS_ADMIN_API_TOKEN repository secret."
            exit 1
          fi
          python backend/scripts/run_daily_sync.py --days-back 7 --source github_actions

      - name: Build dashboard snapshot cache
        env:
          SYNC_URL: ${{ secrets.BASEBALLOS_SYNC_URL }}
          SNAPSHOT_TOKEN: ${{ secrets.DASHBOARD_SNAPSHOT_BUILD_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${SYNC_URL:-}" ] || [ -z "${SNAPSHOT_TOKEN:-}" ]; then
            echo "::error::Missing BASEBALLOS_SYNC_URL or DASHBOARD_SNAPSHOT_BUILD_TOKEN repository secret."
            exit 1
          fi

          normalized_sync_url="${SYNC_URL%/}"
          backend_base_url="${normalized_sync_url%/api/bullpen/sync}"
          if [ "$backend_base_url" = "$normalized_sync_url" ]; then
            echo "::error::BASEBALLOS_SYNC_URL must end with /api/bullpen/sync so the dashboard snapshot URL can be derived safely."
            exit 1
          fi
          snapshot_url="$backend_base_url/api/bullpen/dashboard/snapshot/build"

          snapshot_response="$(mktemp)"
          trap 'rm -f "$snapshot_response"' EXIT

          max_attempts=4
          snapshot_max_time=180
          transient_statuses=" 502 503 504 "
          http_code="000"
          curl_exit=0

          for attempt in $(seq 1 "$max_attempts"); do
            : > "$snapshot_response"
            echo "Snapshot build attempt $attempt/$max_attempts"

            set +e
            http_code=$(curl -sS -o "$snapshot_response" -w '%{http_code}' \
              --connect-timeout 20 --max-time "$snapshot_max_time" \
              -X POST "$snapshot_url" \
              -H "Authorization: Bearer $SNAPSHOT_TOKEN")
            curl_exit=$?
            set -e

            if [ "$curl_exit" -ne 0 ]; then
              http_code="000"
              echo "::warning::Snapshot build attempt $attempt failed before an HTTP response was returned (curl exit $curl_exit)."
            else
              echo "Snapshot build attempt $attempt HTTP status: $http_code"
              echo "Snapshot build attempt $attempt response body:"
              cat "$snapshot_response" || true
              echo

              if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
                echo "Dashboard snapshot build succeeded."
                exit 0
              fi

              if [[ "$transient_statuses" != *" $http_code "* ]]; then
                echo "::error::Snapshot build failed with HTTP $http_code"
                exit 1
              fi

              echo "::warning::Snapshot build attempt $attempt hit transient HTTP $http_code."
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              delay_seconds=$((15 * attempt))
              echo "Retrying dashboard snapshot build in ${delay_seconds}s..."
              sleep "$delay_seconds"
            fi
          done

          echo "::error::Snapshot build failed after $max_attempts attempts. Final HTTP status: $http_code"
          echo "Final response body:"
          cat "$snapshot_response" || true
          echo
          exit 1

      - name: Export static team story preview pages
        env:
          APP_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ADMIN_API_TOKEN: ${{ secrets.BASEBALLOS_ADMIN_API_TOKEN }}
          AUTO_SYNC: 'false'
          FOUR_BEAT_STORIES_ENABLED: 'true'
          BASEBALLOS_SITE_URL: https://baseballos.vercel.app
        run: |
          set -euo pipefail
          python backend/scripts/export_team_story_pages.py --output frontend/public --site-url "$BASEBALLOS_SITE_URL"

      - name: Upload team story preview pages
        uses: actions/upload-artifact@v4
        with:
          name: team-story-preview-pages
          path: frontend/public/team

      - name: Commit team story preview pages
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          if git diff --quiet -- frontend/public/team frontend/public/og/baseballos-card.svg; then
            echo "No team story preview page changes to commit."
            exit 0
          fi

          git config user.name "Nickolis Kacludis"
          git config user.email "nickoliskacludis@gmail.com"
          git add frontend/public/team frontend/public/og/baseballos-card.svg
          git commit -m "docs: update team story preview pages"
          git push
