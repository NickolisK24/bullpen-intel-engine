name: BaseballOS Bullpen Sync

# Reliable production sync. GitHub Actions runs the daily sync as a direct
# Python process against the production database. That sync publishes the
# dashboard snapshot directly, then this workflow verifies the public dashboard
# is serving the published cache. The protected backend sync and snapshot
# endpoints remain available for manual emergency use, but scheduled automation
# does not run large jobs inside Render/Gunicorn web requests.
#
# Pipeline order (see docs/current/SYNC_PIPELINE.md):
#   1. production schedule/finality preflight inside the sync command
#   2. sync (daily gameLog lane / postgame boxscore lane, lookback sweep)
#   3. snapshot publish/withhold happens INSIDE the sync via the same ledger
#      gate; the audit step re-proves it and fails this workflow loudly on
#      any deficit
#   4. appearance ledger audit — publish-eligibility verdict (fail-closed)
#   5. dashboard snapshot cache verification
# Historical backfills are NEVER automatic: trigger mode=backfill with an
# explicit backfill_date from the Actions tab.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   DATABASE_URL                production Postgres connection URL
#   SECRET_KEY                  production Flask secret key
#   BASEBALLOS_ADMIN_API_TOKEN  must match the backend's ADMIN_API_TOKEN
#   BASEBALLOS_SYNC_URL         e.g. https://baseballos-api.onrender.com/api/bullpen/sync
#
# To disable: comment out the `schedule:` block below (manual runs still work
# via the "Run workflow" button), or disable this workflow in the Actions tab.

on:
  schedule:
    # Cron is always UTC and does NOT observe DST. 10:00 UTC is ~6 AM ET during
    # daylight time (most of the MLB season) and ~5 AM ET during standard time.
    - cron: '0 10 * * *'
    # Targeted postgame refreshes after most games are complete. 02:00/04:00/06:00
    # UTC is ~10 PM/12 AM/2 AM ET during daylight time, covering the overnight
    # window with a few passes instead of an every-30-minute cadence.
    - cron: '0 2,4,6 * * *'
  # Allow manual runs from the Actions tab.
  workflow_dispatch:
    inputs:
      mode:
        description: >-
          Sync mode to run. intraday is a manual-only, AUDIT-ONLY check that
          reports what would change without writing any baseball data,
          publishing a snapshot, or warming caches.
        required: true
        default: daily
        type: choice
        options:
          - daily
          - postgame
          - backfill
          - intraday
      backfill_date:
        description: >-
          Slate date (YYYY-MM-DD) to replay when mode=backfill. Backfills are
          never automatic — this input is the only way to reprocess a
          historical slate.
        required: false
        default: ''
        type: string

# Never let scheduled + manual runs pile up on top of each other.
concurrency:
  group: baseballos-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  public-sync:
    runs-on: ubuntu-latest
    # The intraday mode is audit-only and never publishes; it runs in the
    # isolated intraday-audit job below and must not trigger any part of this
    # publish-oriented lane (including the always() ledger/snapshot steps).
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.mode == 'intraday') }}
    # Public freshness lane only: acquisition, public derived state, snapshot
    # publication, Tonight warm, appearance ledger audit, and dashboard cache
    # verification. 40 minutes gives headroom for the worst case of the step
    # timeouts below (20m sync + 10m tonight + 5m audit).
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run direct daily sync
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.mode == 'daily') || (github.event_name == 'schedule' && github.event.schedule == '0 10 * * *') }}
        env:
          APP_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ADMIN_API_TOKEN: ${{ secrets.BASEBALLOS_ADMIN_API_TOKEN }}
          AUTO_SYNC: 'false'
          DAILY_SYNC_COMMAND_TIMEOUT: 20m
          # Whole-command runtime governance. The Python process keeps the
          # daily sync inside this total budget and reserves enough time for
          # fatigue, snapshot publish/withhold, metadata, writer-guard release,
          # and cleanup. The 20m shell timeout is a last-resort kill, not normal
          # control flow.
          DAILY_SYNC_TOTAL_BUDGET_SECONDS: '1080'
          DAILY_SYNC_FINAL_PHASE_RESERVE_SECONDS: '300'
          # Maximum soft budget for the gameLog ingestion stage. The actual
          # budget is the smaller of this cap and the total remaining runtime
          # after final-phase reserve.
          DAILY_SYNC_INGESTION_BUDGET_SECONDS: '720'
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ] || [ -z "${SECRET_KEY:-}" ] || [ -z "${ADMIN_API_TOKEN:-}" ]; then
            echo "::error::Missing DATABASE_URL, SECRET_KEY, or BASEBALLOS_ADMIN_API_TOKEN repository secret."
            exit 1
          fi
          echo "Direct daily sync starting at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          set +e
          timeout --kill-after=30s "$DAILY_SYNC_COMMAND_TIMEOUT" python backend/scripts/run_daily_sync.py --days-back 7 --source github_actions --public-only
          exit_code=$?
          set -e
          if [ "$exit_code" -ne 0 ]; then
            if [ "$exit_code" -eq 124 ] || [ "$exit_code" -eq 137 ] || [ "$exit_code" -eq 143 ]; then
              echo "::error::Direct daily sync timed out after $DAILY_SYNC_COMMAND_TIMEOUT."
            else
              echo "::error::Direct daily sync failed with exit code $exit_code."
            fi
            exit "$exit_code"
          fi
          echo "Direct daily sync completed at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Refresh schedule and warm Tonight
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.mode == 'daily') || (github.event_name == 'schedule' && github.event.schedule == '0 10 * * *') }}
        env:
          APP_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ADMIN_API_TOKEN: ${{ secrets.BASEBALLOS_ADMIN_API_TOKEN }}
          AUTO_SYNC: 'false'
          TONIGHT_REFRESH_COMMAND_TIMEOUT: 10m
          TONIGHT_REFRESH_SCHEDULE_TIMEOUT_SECONDS: '180'
          TONIGHT_REFRESH_WARM_TIMEOUT_SECONDS: '300'
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ] || [ -z "${SECRET_KEY:-}" ] || [ -z "${ADMIN_API_TOKEN:-}" ]; then
            echo "::error::Missing DATABASE_URL, SECRET_KEY, or BASEBALLOS_ADMIN_API_TOKEN repository secret."
            exit 1
          fi
          echo "Refresh schedule and warm Tonight starting at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          set +e
          timeout --kill-after=30s "$TONIGHT_REFRESH_COMMAND_TIMEOUT" python backend/scripts/run_tonight_refresh.py --source github_actions
          exit_code=$?
          set -e
          if [ "$exit_code" -ne 0 ]; then
            if [ "$exit_code" -eq 124 ] || [ "$exit_code" -eq 137 ] || [ "$exit_code" -eq 143 ]; then
              echo "::error::Refresh schedule and warm Tonight timed out after $TONIGHT_REFRESH_COMMAND_TIMEOUT."
            else
              echo "::error::Refresh schedule and warm Tonight failed with exit code $exit_code."
            fi
            exit "$exit_code"
          fi
          echo "Refresh schedule and warm Tonight completed at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Run direct postgame refresh
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.mode == 'postgame') || (github.event_name == 'schedule' && github.event.schedule != '0 10 * * *') }}
        env:
          APP_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ADMIN_API_TOKEN: ${{ secrets.BASEBALLOS_ADMIN_API_TOKEN }}
          AUTO_SYNC: 'false'
          POSTGAME_REFRESH_COMMAND_TIMEOUT: 20m
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ] || [ -z "${SECRET_KEY:-}" ] || [ -z "${ADMIN_API_TOKEN:-}" ]; then
            echo "::error::Missing DATABASE_URL, SECRET_KEY, or BASEBALLOS_ADMIN_API_TOKEN repository secret."
            exit 1
          fi
          echo "Direct postgame refresh starting at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          set +e
          timeout --kill-after=30s "$POSTGAME_REFRESH_COMMAND_TIMEOUT" python backend/scripts/run_postgame_refresh.py --source github_actions --public-only
          exit_code=$?
          set -e
          if [ "$exit_code" -ne 0 ]; then
            if [ "$exit_code" -eq 124 ] || [ "$exit_code" -eq 137 ] || [ "$exit_code" -eq 143 ]; then
              echo "::error::Direct postgame refresh timed out after $POSTGAME_REFRESH_COMMAND_TIMEOUT."
            else
              echo "::error::Direct postgame refresh failed with exit code $exit_code."
            fi
            exit "$exit_code"
          fi
          echo "Direct postgame refresh completed at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Refresh schedule and warm Tonight after postgame
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.mode == 'postgame') || (github.event_name == 'schedule' && github.event.schedule != '0 10 * * *') }}
        env:
          APP_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ADMIN_API_TOKEN: ${{ secrets.BASEBALLOS_ADMIN_API_TOKEN }}
          AUTO_SYNC: 'false'
          TONIGHT_REFRESH_COMMAND_TIMEOUT: 10m
          TONIGHT_REFRESH_SCHEDULE_TIMEOUT_SECONDS: '180'
          TONIGHT_REFRESH_WARM_TIMEOUT_SECONDS: '300'
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ] || [ -z "${SECRET_KEY:-}" ] || [ -z "${ADMIN_API_TOKEN:-}" ]; then
            echo "::error::Missing DATABASE_URL, SECRET_KEY, or BASEBALLOS_ADMIN_API_TOKEN repository secret."
            exit 1
          fi
          echo "Refresh schedule and warm Tonight after postgame starting at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          set +e
          timeout --kill-after=30s "$TONIGHT_REFRESH_COMMAND_TIMEOUT" python backend/scripts/run_tonight_refresh.py --source github_actions_postgame
          exit_code=$?
          set -e
          if [ "$exit_code" -ne 0 ]; then
            if [ "$exit_code" -eq 124 ] || [ "$exit_code" -eq 137 ] || [ "$exit_code" -eq 143 ]; then
              echo "::error::Refresh schedule and warm Tonight after postgame timed out after $TONIGHT_REFRESH_COMMAND_TIMEOUT."
            else
              echo "::error::Refresh schedule and warm Tonight after postgame failed with exit code $exit_code."
            fi
            exit "$exit_code"
          fi
          echo "Refresh schedule and warm Tonight after postgame completed at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      # Explicit historical backfill only. Never runs on a schedule — an
      # operator must dispatch mode=backfill with a concrete slate date.
      - name: Run explicit backfill
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'backfill' }}
        env:
          APP_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ADMIN_API_TOKEN: ${{ secrets.BASEBALLOS_ADMIN_API_TOKEN }}
          AUTO_SYNC: 'false'
          BACKFILL_DATE: ${{ inputs.backfill_date }}
          BACKFILL_COMMAND_TIMEOUT: 20m
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ] || [ -z "${SECRET_KEY:-}" ] || [ -z "${ADMIN_API_TOKEN:-}" ]; then
            echo "::error::Missing DATABASE_URL, SECRET_KEY, or BASEBALLOS_ADMIN_API_TOKEN repository secret."
            exit 1
          fi
          if ! [[ "${BACKFILL_DATE:-}" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "::error::mode=backfill requires backfill_date in YYYY-MM-DD form (got '${BACKFILL_DATE:-}')."
            exit 1
          fi
          echo "Explicit backfill for slate ${BACKFILL_DATE} starting at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          set +e
          timeout --kill-after=30s "$BACKFILL_COMMAND_TIMEOUT" python backend/scripts/run_postgame_refresh.py --date "$BACKFILL_DATE" --source github_actions_backfill --public-only
          exit_code=$?
          set -e
          if [ "$exit_code" -ne 0 ]; then
            if [ "$exit_code" -eq 124 ] || [ "$exit_code" -eq 137 ] || [ "$exit_code" -eq 143 ]; then
              echo "::error::Explicit backfill timed out after $BACKFILL_COMMAND_TIMEOUT."
            else
              echo "::error::Explicit backfill failed with exit code $exit_code."
            fi
            exit "$exit_code"
          fi
          echo "Explicit backfill completed at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      # Appearance Ledger audit — the publish-eligibility verdict. Runs after
      # every sync mode (daily, postgame, backfill). Exit 0 = ledger proven
      # complete; exit 1 = deficits (the snapshot publisher withheld or will
      # withhold publication); exit 2 = the audit itself could not run. Any
      # non-zero verdict fails this workflow loudly — an unprovable appearance
      # ledger is a trust incident, not a warning.
      - name: Appearance ledger audit (publish eligibility)
        if: ${{ always() }}
        env:
          APP_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ADMIN_API_TOKEN: ${{ secrets.BASEBALLOS_ADMIN_API_TOKEN }}
          AUTO_SYNC: 'false'
          LEDGER_AUDIT_COMMAND_TIMEOUT: 5m
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ] || [ -z "${SECRET_KEY:-}" ] || [ -z "${ADMIN_API_TOKEN:-}" ]; then
            echo "::error::Missing DATABASE_URL, SECRET_KEY, or BASEBALLOS_ADMIN_API_TOKEN repository secret."
            exit 1
          fi
          echo "Appearance ledger audit starting at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          set +e
          timeout --kill-after=30s "$LEDGER_AUDIT_COMMAND_TIMEOUT" \
            python backend/scripts/appearance_ledger_audit.py --days 10 --deep \
            | tee ledger_audit_report.txt
          exit_code=${PIPESTATUS[0]}
          set -e
          case "$exit_code" in
            0)
              echo "::notice title=Appearance Ledger::Publish eligible: YES — appearance ledger proven complete for the trailing window."
              ;;
            1)
              echo "::error title=Appearance Ledger::Publish eligible: NO — appearance ledger has deficits. Snapshot publication is withheld (fail-closed). See the audit report above for missing game_pks and affected players; replay with mode=backfill and the flagged slate date."
              exit 1
              ;;
            124|137|143)
              echo "::error title=Appearance Ledger::Ledger audit timed out after $LEDGER_AUDIT_COMMAND_TIMEOUT — publish eligibility is UNPROVEN."
              exit "$exit_code"
              ;;
            *)
              echo "::error title=Appearance Ledger::Ledger audit could not run (exit $exit_code) — publish eligibility is UNPROVEN."
              exit "$exit_code"
              ;;
          esac

      - name: Upload appearance ledger audit report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: appearance-ledger-audit-${{ github.run_id }}
          path: ledger_audit_report.txt
          if-no-files-found: ignore

      - name: Verify dashboard snapshot cache
        if: ${{ always() }}
        env:
          SYNC_URL: ${{ secrets.BASEBALLOS_SYNC_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SYNC_URL:-}" ]; then
            echo "::error::Missing BASEBALLOS_SYNC_URL repository secret."
            exit 1
          fi

          normalized_sync_url="${SYNC_URL%/}"
          backend_base_url="${normalized_sync_url%/api/bullpen/sync}"
          if [ "$backend_base_url" = "$normalized_sync_url" ]; then
            echo "::error::BASEBALLOS_SYNC_URL must end with /api/bullpen/sync so the dashboard URL can be derived safely."
            exit 1
          fi
          dashboard_url="$backend_base_url/api/bullpen/dashboard"

          dashboard_response="$(mktemp)"
          trap 'rm -f "$dashboard_response"' EXIT

          max_attempts=4
          dashboard_max_time=60
          transient_statuses=" 502 503 504 "
          http_code="000"
          curl_exit=0

          for attempt in $(seq 1 "$max_attempts"); do
            : > "$dashboard_response"
            echo "Dashboard snapshot verification attempt $attempt/$max_attempts"

            set +e
            http_code=$(curl -sS -o "$dashboard_response" -w '%{http_code}' \
              --connect-timeout 20 --max-time "$dashboard_max_time" \
              "$dashboard_url")
            curl_exit=$?
            set -e

            if [ "$curl_exit" -ne 0 ]; then
              http_code="000"
              echo "::warning::Dashboard snapshot verification attempt $attempt failed before an HTTP response was returned (curl exit $curl_exit)."
            else
              echo "Dashboard snapshot verification attempt $attempt HTTP status: $http_code"

              if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
                python - "$dashboard_response" <<'PY'
          import json
          import sys

          path = sys.argv[1]
          try:
              with open(path, encoding='utf-8') as handle:
                  payload = json.load(handle)
          except json.JSONDecodeError as exc:
              print(f'::error::Dashboard snapshot verification failed: response was not valid JSON ({exc}).')
              raise SystemExit(1)

          snapshot = payload.get('snapshot') or {}
          errors = []
          if snapshot.get('served_from') != 'cache':
              errors.append(f"snapshot.served_from={snapshot.get('served_from')!r}")
          if snapshot.get('is_published') is not True:
              errors.append(f"snapshot.is_published={snapshot.get('is_published')!r}")
          if not snapshot.get('snapshot_id'):
              errors.append('snapshot.snapshot_id missing')
          if not snapshot.get('data_through'):
              errors.append('snapshot.data_through missing')
          if not snapshot.get('snapshot_generated_at'):
              errors.append('snapshot.snapshot_generated_at missing')

          if errors:
              print('::error::Dashboard snapshot verification failed: ' + '; '.join(errors))
              raise SystemExit(1)

          print(
              'Dashboard snapshot verification passed: '
              f"id={snapshot.get('snapshot_id')} "
              f"data_through={snapshot.get('data_through')} "
              f"generated_at={snapshot.get('snapshot_generated_at')}"
          )
          PY
                echo "Dashboard snapshot cache verification succeeded."
                exit 0
              fi

              if [[ "$transient_statuses" != *" $http_code "* ]]; then
                echo "::error::Dashboard snapshot verification failed with HTTP $http_code"
                echo "Response body:"
                cat "$dashboard_response" || true
                echo
                exit 1
              fi

              echo "::warning::Dashboard snapshot verification attempt $attempt hit transient HTTP $http_code."
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              delay_seconds=$((15 * attempt))
              echo "Retrying dashboard snapshot verification in ${delay_seconds}s..."
              sleep "$delay_seconds"
            fi
          done

          echo "::error::Dashboard snapshot verification failed after $max_attempts attempts. Final HTTP status: $http_code"
          echo "Final response body:"
          cat "$dashboard_response" || true
          echo
          exit 1

  internal-enrichment:
    runs-on: ubuntu-latest
    needs: public-sync
    if: ${{ needs.public-sync.result == 'success' }}
    continue-on-error: true
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run internal enrichment after daily public sync
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.mode == 'daily') || (github.event_name == 'schedule' && github.event.schedule == '0 10 * * *') }}
        env:
          APP_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ADMIN_API_TOKEN: ${{ secrets.BASEBALLOS_ADMIN_API_TOKEN }}
          AUTO_SYNC: 'false'
          INTERNAL_ENRICHMENT_COMMAND_TIMEOUT: 45m
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ] || [ -z "${SECRET_KEY:-}" ] || [ -z "${ADMIN_API_TOKEN:-}" ]; then
            echo "::error::Missing DATABASE_URL, SECRET_KEY, or BASEBALLOS_ADMIN_API_TOKEN repository secret."
            exit 1
          fi
          echo "Internal enrichment after daily public sync starting at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          set +e
          timeout --kill-after=30s "$INTERNAL_ENRICHMENT_COMMAND_TIMEOUT" python backend/scripts/run_internal_enrichment.py --mode daily --source github_actions_internal
          exit_code=$?
          set -e
          if [ "$exit_code" -ne 0 ]; then
            if [ "$exit_code" -eq 124 ] || [ "$exit_code" -eq 137 ] || [ "$exit_code" -eq 143 ]; then
              echo "::error::Internal enrichment after daily public sync timed out after $INTERNAL_ENRICHMENT_COMMAND_TIMEOUT."
            else
              echo "::error::Internal enrichment after daily public sync failed with exit code $exit_code."
            fi
            exit "$exit_code"
          fi
          echo "Internal enrichment after daily public sync completed at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Run internal enrichment after postgame public sync
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.mode == 'postgame') || (github.event_name == 'schedule' && github.event.schedule != '0 10 * * *') }}
        env:
          APP_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ADMIN_API_TOKEN: ${{ secrets.BASEBALLOS_ADMIN_API_TOKEN }}
          AUTO_SYNC: 'false'
          INTERNAL_ENRICHMENT_COMMAND_TIMEOUT: 20m
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ] || [ -z "${SECRET_KEY:-}" ] || [ -z "${ADMIN_API_TOKEN:-}" ]; then
            echo "::error::Missing DATABASE_URL, SECRET_KEY, or BASEBALLOS_ADMIN_API_TOKEN repository secret."
            exit 1
          fi
          echo "Internal enrichment after postgame public sync starting at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          set +e
          timeout --kill-after=30s "$INTERNAL_ENRICHMENT_COMMAND_TIMEOUT" python backend/scripts/run_internal_enrichment.py --mode postgame --source github_actions_internal --skip-backtest
          exit_code=$?
          set -e
          if [ "$exit_code" -ne 0 ]; then
            if [ "$exit_code" -eq 124 ] || [ "$exit_code" -eq 137 ] || [ "$exit_code" -eq 143 ]; then
              echo "::error::Internal enrichment after postgame public sync timed out after $INTERNAL_ENRICHMENT_COMMAND_TIMEOUT."
            else
              echo "::error::Internal enrichment after postgame public sync failed with exit code $exit_code."
            fi
            exit "$exit_code"
          fi
          echo "Internal enrichment after postgame public sync completed at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

  static-team-story-preview:
    runs-on: ubuntu-latest
    needs: public-sync
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.mode == 'daily') || (github.event_name == 'schedule' && github.event.schedule == '0 10 * * *') }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Export static team story preview pages
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.mode == 'daily') || (github.event_name == 'schedule' && github.event.schedule == '0 10 * * *') }}
        env:
          APP_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ADMIN_API_TOKEN: ${{ secrets.BASEBALLOS_ADMIN_API_TOKEN }}
          AUTO_SYNC: 'false'
          BASEBALLOS_SITE_URL: https://baseballos.app
        run: |
          set -euo pipefail
          python backend/scripts/export_team_story_pages.py --output frontend/public --site-url "$BASEBALLOS_SITE_URL"

      - name: Upload team story preview pages
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.mode == 'daily') || (github.event_name == 'schedule' && github.event.schedule == '0 10 * * *') }}
        uses: actions/upload-artifact@v4
        with:
          name: team-story-preview-pages
          path: frontend/public/team

      - name: Commit team story preview pages
        if: ${{ github.ref == 'refs/heads/main' && ((github.event_name == 'workflow_dispatch' && inputs.mode == 'daily') || (github.event_name == 'schedule' && github.event.schedule == '0 10 * * *')) }}
        run: |
          set -euo pipefail
          if git diff --quiet -- frontend/public/team frontend/public/og/baseballos-card.svg; then
            echo "No team story preview page changes to commit."
            exit 0
          fi

          git config user.name "Nickolis Kacludis"
          git config user.email "nickoliskacludis@gmail.com"
          git add frontend/public/team frontend/public/og/baseballos-card.svg
          git commit -m "docs: update team story preview pages"
          git push

  # Manual-only, AUDIT-ONLY intraday reconciliation (Phase 1). This job never
  # runs on a schedule — there is deliberately no cron entry for it. It reads
  # authoritative source state, compares it with stored BaseballOS state, and
  # uploads a structured JSON audit of what would need to change. It performs no
  # canonical baseball-data writes, publishes no snapshot, runs no fatigue/story
  # work, and warms no public cache, so it is fully isolated from the publish
  # lane above (no ledger gate, no snapshot-cache verification).
  intraday-audit:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'intraday' }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run intraday reconciliation audit (check-only, no writes)
        env:
          APP_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          # Production Flask initialization (create_app under APP_ENV=production)
          # requires the admin token so operational write endpoints are never
          # exposed to anonymous callers. The audit itself remains read-only;
          # supplying this token neither authorizes nor triggers any write.
          ADMIN_API_TOKEN: ${{ secrets.BASEBALLOS_ADMIN_API_TOKEN }}
          AUTO_SYNC: 'false'
          INTRADAY_AUDIT_COMMAND_TIMEOUT: 15m
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ] || [ -z "${SECRET_KEY:-}" ] || [ -z "${ADMIN_API_TOKEN:-}" ]; then
            echo "::error::Missing DATABASE_URL, SECRET_KEY, or BASEBALLOS_ADMIN_API_TOKEN repository secret."
            exit 1
          fi
          echo "Intraday reconciliation audit starting at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          # The command writes the JSON artifact to --output and also prints the
          # single JSON object to stdout (workflow log). We capture its exit code
          # but do NOT fail the step here, so the always() validate + upload steps
          # below run first; the original exit code is re-applied afterward. Even
          # a bootstrap failure produces a valid failed JSON artifact.
          set +e
          timeout --kill-after=30s "$INTRADAY_AUDIT_COMMAND_TIMEOUT" \
            python backend/scripts/run_intraday_reconcile.py \
            --source github_actions --json --output intraday-reconciliation-audit.json
          exit_code=$?
          set -e
          echo "$exit_code" > intraday-audit-exit-code
          case "$exit_code" in
            0) echo "Intraday reconciliation audit completed (success/skipped) at $(date -u +'%Y-%m-%dT%H:%M:%SZ')." ;;
            1) echo "::warning::Intraday reconciliation audit returned partial/failed verification (exit 1). See the uploaded artifact." ;;
            124|137|143) echo "::error::Intraday reconciliation audit timed out after $INTRADAY_AUDIT_COMMAND_TIMEOUT." ;;
            *) echo "::error::Intraday reconciliation audit failed with exit code $exit_code." ;;
          esac

      # Validate the audit artifact BEFORE upload, without hiding the command's
      # original exit code. A missing / empty / malformed / wrong-capability
      # artifact is an artifact-contract failure, distinct from a normal
      # partial/failed audit (which still produces a valid, recognized JSON
      # report). The result is recorded for the exit-code step below.
      - name: Validate intraday audit artifact contract
        if: ${{ always() }}
        run: |
          set -euo pipefail
          set +e
          python backend/scripts/validate_intraday_artifact.py intraday-reconciliation-audit.json
          validate_code=$?
          set -e
          if [ "$validate_code" -eq 0 ]; then
            echo "1" > intraday-audit-artifact-valid
            echo "Intraday audit artifact passed the output-contract check."
          else
            echo "0" > intraday-audit-artifact-valid
            echo "::error::Intraday audit artifact failed the output-contract check (missing, empty, malformed, or wrong capability/mode/check_only/status)."
          fi

      - name: Upload intraday audit artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: intraday-reconciliation-audit-${{ github.run_id }}
          path: intraday-reconciliation-audit.json
          if-no-files-found: ignore

      - name: Preserve intraday audit exit code
        if: ${{ always() }}
        run: |
          set -euo pipefail
          code="$(cat intraday-audit-exit-code 2>/dev/null || echo 1)"
          artifact_valid="$(cat intraday-audit-artifact-valid 2>/dev/null || echo 0)"
          # A genuine failed/partial audit keeps its own exit code (never turned
          # green). If no valid artifact was produced at all, report an
          # artifact-contract failure rather than a normal partial audit.
          if [ "$artifact_valid" != "1" ]; then
            echo "::error::Intraday audit artifact-contract failure: no valid intraday-reconciliation-audit.json was produced. This is an artifact-contract failure, not a normal partial audit."
            if [ "$code" = "0" ]; then
              code=1
            fi
          fi
          echo "Re-applying intraday audit exit code: $code"
          exit "$code"
