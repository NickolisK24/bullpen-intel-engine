name: BaseballOS Bullpen Sync

# Reliable production sync. GitHub Actions runs the daily sync as a direct
# Python process against the production database. That sync publishes the
# dashboard snapshot directly, then this workflow verifies the public dashboard
# is serving the published cache. The protected backend sync and snapshot
# endpoints remain available for manual emergency use, but scheduled automation
# does not run large jobs inside Render/Gunicorn web requests.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   DATABASE_URL                production Postgres connection URL
#   SECRET_KEY                  production Flask secret key
#   BASEBALLOS_ADMIN_API_TOKEN  must match the backend's ADMIN_API_TOKEN
#   BASEBALLOS_SYNC_URL         e.g. https://baseballos-api.onrender.com/api/bullpen/sync
#
# To disable: comment out the `schedule:` block below (manual runs still work
# via the "Run workflow" button), or disable this workflow in the Actions tab.

on:
  schedule:
    # Cron is always UTC and does NOT observe DST. 10:00 UTC is ~6 AM ET during
    # daylight time (most of the MLB season) and ~5 AM ET during standard time.
    - cron: '0 10 * * *'
    # Targeted postgame refreshes after most games are complete. 02:00/04:00/06:00
    # UTC is ~10 PM/12 AM/2 AM ET during daylight time, covering the overnight
    # window with a few passes instead of an every-30-minute cadence.
    - cron: '0 2,4,6 * * *'
  # Allow manual runs from the Actions tab.
  workflow_dispatch:
    inputs:
      mode:
        description: Sync mode to run
        required: true
        default: daily
        type: choice
        options:
          - daily
          - postgame

# Never let scheduled + manual runs pile up on top of each other.
concurrency:
  group: baseballos-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    # The postgame path legitimately includes the homepage lead-story rebuild
    # (one story per team with a completed-game context), the dashboard snapshot
    # verify, and — on the daily run — the static story export. 15 minutes was
    # too tight for that expected work and canceled mid-rebuild. 25 gives
    # headroom; the refresh now logs phase/elapsed timings (and the lead-story
    # rebuild can be skipped via POSTGAME_REFRESH_SNAPSHOT) so a genuine hang is
    # diagnosable rather than a silent cancellation.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run direct daily sync
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.mode == 'daily') || (github.event_name == 'schedule' && github.event.schedule == '0 10 * * *') }}
        env:
          APP_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ADMIN_API_TOKEN: ${{ secrets.BASEBALLOS_ADMIN_API_TOKEN }}
          AUTO_SYNC: 'false'
          DAILY_SYNC_COMMAND_TIMEOUT: 20m
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ] || [ -z "${SECRET_KEY:-}" ] || [ -z "${ADMIN_API_TOKEN:-}" ]; then
            echo "::error::Missing DATABASE_URL, SECRET_KEY, or BASEBALLOS_ADMIN_API_TOKEN repository secret."
            exit 1
          fi
          echo "Direct daily sync starting at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          set +e
          timeout --kill-after=30s "$DAILY_SYNC_COMMAND_TIMEOUT" python backend/scripts/run_daily_sync.py --days-back 7 --source github_actions
          exit_code=$?
          set -e
          if [ "$exit_code" -ne 0 ]; then
            if [ "$exit_code" -eq 124 ] || [ "$exit_code" -eq 137 ] || [ "$exit_code" -eq 143 ]; then
              echo "::error::Direct daily sync timed out after $DAILY_SYNC_COMMAND_TIMEOUT."
            else
              echo "::error::Direct daily sync failed with exit code $exit_code."
            fi
            exit "$exit_code"
          fi
          echo "Direct daily sync completed at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Refresh schedule and warm Tonight
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.mode == 'daily') || (github.event_name == 'schedule' && github.event.schedule == '0 10 * * *') }}
        env:
          APP_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ADMIN_API_TOKEN: ${{ secrets.BASEBALLOS_ADMIN_API_TOKEN }}
          AUTO_SYNC: 'false'
          TONIGHT_REFRESH_COMMAND_TIMEOUT: 10m
          TONIGHT_REFRESH_SCHEDULE_TIMEOUT_SECONDS: '180'
          TONIGHT_REFRESH_WARM_TIMEOUT_SECONDS: '300'
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ] || [ -z "${SECRET_KEY:-}" ] || [ -z "${ADMIN_API_TOKEN:-}" ]; then
            echo "::error::Missing DATABASE_URL, SECRET_KEY, or BASEBALLOS_ADMIN_API_TOKEN repository secret."
            exit 1
          fi
          echo "Refresh schedule and warm Tonight starting at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          set +e
          timeout --kill-after=30s "$TONIGHT_REFRESH_COMMAND_TIMEOUT" python backend/scripts/run_tonight_refresh.py --source github_actions
          exit_code=$?
          set -e
          if [ "$exit_code" -ne 0 ]; then
            if [ "$exit_code" -eq 124 ] || [ "$exit_code" -eq 137 ] || [ "$exit_code" -eq 143 ]; then
              echo "::error::Refresh schedule and warm Tonight timed out after $TONIGHT_REFRESH_COMMAND_TIMEOUT."
            else
              echo "::error::Refresh schedule and warm Tonight failed with exit code $exit_code."
            fi
            exit "$exit_code"
          fi
          echo "Refresh schedule and warm Tonight completed at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Run direct postgame refresh
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.mode == 'postgame') || (github.event_name == 'schedule' && github.event.schedule != '0 10 * * *') }}
        env:
          APP_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ADMIN_API_TOKEN: ${{ secrets.BASEBALLOS_ADMIN_API_TOKEN }}
          AUTO_SYNC: 'false'
          POSTGAME_REFRESH_COMMAND_TIMEOUT: 20m
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ] || [ -z "${SECRET_KEY:-}" ] || [ -z "${ADMIN_API_TOKEN:-}" ]; then
            echo "::error::Missing DATABASE_URL, SECRET_KEY, or BASEBALLOS_ADMIN_API_TOKEN repository secret."
            exit 1
          fi
          echo "Direct postgame refresh starting at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          set +e
          timeout --kill-after=30s "$POSTGAME_REFRESH_COMMAND_TIMEOUT" python backend/scripts/run_postgame_refresh.py --source github_actions
          exit_code=$?
          set -e
          if [ "$exit_code" -ne 0 ]; then
            if [ "$exit_code" -eq 124 ] || [ "$exit_code" -eq 137 ] || [ "$exit_code" -eq 143 ]; then
              echo "::error::Direct postgame refresh timed out after $POSTGAME_REFRESH_COMMAND_TIMEOUT."
            else
              echo "::error::Direct postgame refresh failed with exit code $exit_code."
            fi
            exit "$exit_code"
          fi
          echo "Direct postgame refresh completed at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Refresh schedule and warm Tonight after postgame
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.mode == 'postgame') || (github.event_name == 'schedule' && github.event.schedule != '0 10 * * *') }}
        env:
          APP_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ADMIN_API_TOKEN: ${{ secrets.BASEBALLOS_ADMIN_API_TOKEN }}
          AUTO_SYNC: 'false'
          TONIGHT_REFRESH_COMMAND_TIMEOUT: 10m
          TONIGHT_REFRESH_SCHEDULE_TIMEOUT_SECONDS: '180'
          TONIGHT_REFRESH_WARM_TIMEOUT_SECONDS: '300'
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ] || [ -z "${SECRET_KEY:-}" ] || [ -z "${ADMIN_API_TOKEN:-}" ]; then
            echo "::error::Missing DATABASE_URL, SECRET_KEY, or BASEBALLOS_ADMIN_API_TOKEN repository secret."
            exit 1
          fi
          echo "Refresh schedule and warm Tonight after postgame starting at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          set +e
          timeout --kill-after=30s "$TONIGHT_REFRESH_COMMAND_TIMEOUT" python backend/scripts/run_tonight_refresh.py --source github_actions_postgame
          exit_code=$?
          set -e
          if [ "$exit_code" -ne 0 ]; then
            if [ "$exit_code" -eq 124 ] || [ "$exit_code" -eq 137 ] || [ "$exit_code" -eq 143 ]; then
              echo "::error::Refresh schedule and warm Tonight after postgame timed out after $TONIGHT_REFRESH_COMMAND_TIMEOUT."
            else
              echo "::error::Refresh schedule and warm Tonight after postgame failed with exit code $exit_code."
            fi
            exit "$exit_code"
          fi
          echo "Refresh schedule and warm Tonight after postgame completed at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Verify dashboard snapshot cache
        env:
          SYNC_URL: ${{ secrets.BASEBALLOS_SYNC_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SYNC_URL:-}" ]; then
            echo "::error::Missing BASEBALLOS_SYNC_URL repository secret."
            exit 1
          fi

          normalized_sync_url="${SYNC_URL%/}"
          backend_base_url="${normalized_sync_url%/api/bullpen/sync}"
          if [ "$backend_base_url" = "$normalized_sync_url" ]; then
            echo "::error::BASEBALLOS_SYNC_URL must end with /api/bullpen/sync so the dashboard URL can be derived safely."
            exit 1
          fi
          dashboard_url="$backend_base_url/api/bullpen/dashboard"

          dashboard_response="$(mktemp)"
          trap 'rm -f "$dashboard_response"' EXIT

          max_attempts=4
          dashboard_max_time=60
          transient_statuses=" 502 503 504 "
          http_code="000"
          curl_exit=0

          for attempt in $(seq 1 "$max_attempts"); do
            : > "$dashboard_response"
            echo "Dashboard snapshot verification attempt $attempt/$max_attempts"

            set +e
            http_code=$(curl -sS -o "$dashboard_response" -w '%{http_code}' \
              --connect-timeout 20 --max-time "$dashboard_max_time" \
              "$dashboard_url")
            curl_exit=$?
            set -e

            if [ "$curl_exit" -ne 0 ]; then
              http_code="000"
              echo "::warning::Dashboard snapshot verification attempt $attempt failed before an HTTP response was returned (curl exit $curl_exit)."
            else
              echo "Dashboard snapshot verification attempt $attempt HTTP status: $http_code"

              if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
                python - "$dashboard_response" <<'PY'
          import json
          import sys

          path = sys.argv[1]
          try:
              with open(path, encoding='utf-8') as handle:
                  payload = json.load(handle)
          except json.JSONDecodeError as exc:
              print(f'::error::Dashboard snapshot verification failed: response was not valid JSON ({exc}).')
              raise SystemExit(1)

          snapshot = payload.get('snapshot') or {}
          errors = []
          if snapshot.get('served_from') != 'cache':
              errors.append(f"snapshot.served_from={snapshot.get('served_from')!r}")
          if snapshot.get('is_published') is not True:
              errors.append(f"snapshot.is_published={snapshot.get('is_published')!r}")
          if not snapshot.get('snapshot_id'):
              errors.append('snapshot.snapshot_id missing')
          if not snapshot.get('data_through'):
              errors.append('snapshot.data_through missing')
          if not snapshot.get('snapshot_generated_at'):
              errors.append('snapshot.snapshot_generated_at missing')

          if errors:
              print('::error::Dashboard snapshot verification failed: ' + '; '.join(errors))
              raise SystemExit(1)

          print(
              'Dashboard snapshot verification passed: '
              f"id={snapshot.get('snapshot_id')} "
              f"data_through={snapshot.get('data_through')} "
              f"generated_at={snapshot.get('snapshot_generated_at')}"
          )
          PY
                echo "Dashboard snapshot cache verification succeeded."
                exit 0
              fi

              if [[ "$transient_statuses" != *" $http_code "* ]]; then
                echo "::error::Dashboard snapshot verification failed with HTTP $http_code"
                echo "Response body:"
                cat "$dashboard_response" || true
                echo
                exit 1
              fi

              echo "::warning::Dashboard snapshot verification attempt $attempt hit transient HTTP $http_code."
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              delay_seconds=$((15 * attempt))
              echo "Retrying dashboard snapshot verification in ${delay_seconds}s..."
              sleep "$delay_seconds"
            fi
          done

          echo "::error::Dashboard snapshot verification failed after $max_attempts attempts. Final HTTP status: $http_code"
          echo "Final response body:"
          cat "$dashboard_response" || true
          echo
          exit 1

      - name: Export static team story preview pages
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.mode == 'daily') || (github.event_name == 'schedule' && github.event.schedule == '0 10 * * *') }}
        env:
          APP_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ADMIN_API_TOKEN: ${{ secrets.BASEBALLOS_ADMIN_API_TOKEN }}
          AUTO_SYNC: 'false'
          BASEBALLOS_SITE_URL: https://baseballos.app
        run: |
          set -euo pipefail
          python backend/scripts/export_team_story_pages.py --output frontend/public --site-url "$BASEBALLOS_SITE_URL"

      - name: Upload team story preview pages
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.mode == 'daily') || (github.event_name == 'schedule' && github.event.schedule == '0 10 * * *') }}
        uses: actions/upload-artifact@v4
        with:
          name: team-story-preview-pages
          path: frontend/public/team

      - name: Commit team story preview pages
        if: ${{ github.ref == 'refs/heads/main' && ((github.event_name == 'workflow_dispatch' && inputs.mode == 'daily') || (github.event_name == 'schedule' && github.event.schedule == '0 10 * * *')) }}
        run: |
          set -euo pipefail
          if git diff --quiet -- frontend/public/team frontend/public/og/baseballos-card.svg; then
            echo "No team story preview page changes to commit."
            exit 0
          fi

          git config user.name "Nickolis Kacludis"
          git config user.email "nickoliskacludis@gmail.com"
          git add frontend/public/team frontend/public/og/baseballos-card.svg
          git commit -m "docs: update team story preview pages"
          git push
