name: BaseballOS Production Maintenance

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Production maintenance operation to run
        required: true
        type: choice
        options:
          - migrate
          - ledger_backfill
          - phase0h_snapshot_audit
      confirmation:
        description: Type RUN_PRODUCTION_MAINTENANCE, or RUN_PHASE0H_PRODUCTION_AUDIT for phase0h_snapshot_audit
        required: true
        type: string
      audit_window:
        description: Phase 0H audit window in days; ratification gate requires 14
        required: true
        default: '14'
        type: string
      audit_recent_row_limit:
        description: Phase 0H operator audit recent row limit; web route remains request-safe
        required: true
        default: '256'
        type: string
      season:
        description: Regular season year for ledger backfill
        required: true
        default: '2026'
        type: string
      start_date:
        description: Schedule ingestion start date (YYYY-MM-DD)
        required: true
        default: '2026-03-30'
        type: string
      through_date:
        description: Ledger coverage end date (YYYY-MM-DD)
        required: true
        default: '2026-07-09'
        type: string
      pitcher_mlb_id:
        description: Optional MLB pitcher ID; leave empty to backfill all pitchers
        required: false
        default: '621112'
        type: string

concurrency:
  group: baseballos-production-maintenance
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  maintain-production:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      APP_ENV: production
      AUTO_SYNC: 'false'
      FLASK_APP: app.py
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ADMIN_API_TOKEN: ${{ secrets.BASEBALLOS_ADMIN_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Validate confirmation and production secrets
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
          OPERATION: ${{ inputs.operation }}
        run: |
          set -euo pipefail
          expected_confirmation='RUN_PRODUCTION_MAINTENANCE'
          if [ "$OPERATION" = 'phase0h_snapshot_audit' ]; then
            expected_confirmation='RUN_PHASE0H_PRODUCTION_AUDIT'
          fi
          if [ "$CONFIRMATION" != "$expected_confirmation" ]; then
            echo "::error::Confirmation must be exactly $expected_confirmation for operation=$OPERATION."
            exit 1
          fi
          if [ -z "${DATABASE_URL:-}" ] || [ -z "${SECRET_KEY:-}" ] || [ -z "${ADMIN_API_TOKEN:-}" ]; then
            echo "::error::Missing DATABASE_URL, SECRET_KEY, or BASEBALLOS_ADMIN_API_TOKEN repository secret."
            exit 1
          fi
          echo "Production maintenance confirmation and required secrets validated."

      - name: Validate ledger backfill inputs
        if: ${{ inputs.operation == 'ledger_backfill' }}
        env:
          SEASON: ${{ inputs.season }}
          START_DATE: ${{ inputs.start_date }}
          THROUGH_DATE: ${{ inputs.through_date }}
          PITCHER_MLB_ID: ${{ inputs.pitcher_mlb_id }}
        run: |
          set -euo pipefail
          if [[ ! "$SEASON" =~ ^[0-9]{4}$ ]]; then
            echo "::error::season must contain exactly four digits."
            exit 1
          fi
          if [[ ! "$START_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "::error::start_date must use YYYY-MM-DD format."
            exit 1
          fi
          if [[ ! "$THROUGH_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "::error::through_date must use YYYY-MM-DD format."
            exit 1
          fi
          if [ -n "$PITCHER_MLB_ID" ] && [[ ! "$PITCHER_MLB_ID" =~ ^[0-9]+$ ]]; then
            echo "::error::pitcher_mlb_id must be empty or contain only digits."
            exit 1
          fi
          echo "Ledger backfill inputs validated."

      - name: Validate Phase 0H audit inputs
        if: ${{ inputs.operation == 'phase0h_snapshot_audit' }}
        env:
          AUDIT_WINDOW: ${{ inputs.audit_window }}
          AUDIT_RECENT_ROW_LIMIT: ${{ inputs.audit_recent_row_limit }}
        run: |
          set -euo pipefail
          if [ "$AUDIT_WINDOW" != '14' ]; then
            echo "::error::Phase 0H production ratification requires audit_window=14."
            exit 1
          fi
          if [[ ! "$AUDIT_RECENT_ROW_LIMIT" =~ ^[0-9]+$ ]]; then
            echo "::error::audit_recent_row_limit must contain only digits."
            exit 1
          fi
          if [ "$AUDIT_RECENT_ROW_LIMIT" -lt 64 ] || [ "$AUDIT_RECENT_ROW_LIMIT" -gt 512 ]; then
            echo "::error::audit_recent_row_limit must be between 64 and 512."
            exit 1
          fi
          echo "Phase 0H audit inputs validated."

      - name: Run production migration
        if: ${{ inputs.operation == 'migrate' }}
        working-directory: backend
        run: |
          set -euo pipefail
          echo "=== Production migration starting ==="
          echo "--- Current migration revision (before upgrade) ---"
          flask db current
          echo "--- Applying migrations ---"
          flask db upgrade
          echo "--- Current migration revision (after upgrade) ---"
          flask db current
          echo "=== Production migration completed ==="

      - name: Run production ledger backfill
        if: ${{ inputs.operation == 'ledger_backfill' }}
        working-directory: backend
        env:
          SEASON: ${{ inputs.season }}
          START_DATE: ${{ inputs.start_date }}
          THROUGH_DATE: ${{ inputs.through_date }}
          PITCHER_MLB_ID: ${{ inputs.pitcher_mlb_id }}
        run: |
          set -euo pipefail
          schedule_summary_file="$(mktemp)"
          backfill_summary_file="$(mktemp)"
          trap 'rm -f "$schedule_summary_file" "$backfill_summary_file"' EXIT

          validate_summary() {
            local summary_file="$1"
            local summary_kind="$2"
            python - "$summary_file" "$summary_kind" <<'PY'
          import json
          from pathlib import Path
          import sys

          lines = Path(sys.argv[1]).read_text(encoding='utf-8').splitlines()
          summary_kind = sys.argv[2]
          summary = None
          decoder = json.JSONDecoder()

          for index in range(len(lines) - 1, -1, -1):
              raw_line = lines[index]
              candidate = raw_line.strip()
              if not candidate:
                  continue
              try:
                  parsed = json.loads(candidate)
              except json.JSONDecodeError:
                  if not raw_line.startswith('{'):
                      continue
                  try:
                      parsed, _ = decoder.raw_decode('\n'.join(lines[index:]))
                  except json.JSONDecodeError:
                      continue
              if isinstance(parsed, dict):
                  summary = parsed
                  break

          if summary is None:
              raise SystemExit('No JSON summary object found in command output.')

          if summary_kind == 'schedule':
              if summary.get('status') != 'ok':
                  raise SystemExit(
                      'Schedule ingestion did not complete successfully: '
                      f"status={summary.get('status')!r}"
                  )
          elif summary_kind == 'backfill':
              if int(summary.get('pitchers_total', 0)) <= 0:
                  raise SystemExit('Ledger backfill matched no pitchers.')
              failure_fields = (
                  'fetch_failures',
                  'records_failed',
                  'coverage_records_incomplete',
              )
              failures = {
                  field: int(summary.get(field, 0))
                  for field in failure_fields
                  if int(summary.get(field, 0)) > 0
              }
              if failures:
                  raise SystemExit(
                      f'Ledger backfill reported incomplete work: {failures}'
                  )
          else:
              raise SystemExit(f'Unknown summary kind: {summary_kind!r}')
          PY
          }

          echo "=== Production ledger backfill starting ==="
          echo "--- Ingesting schedule finality evidence ---"
          python scripts/ingest_schedule.py \
            --start-date "$START_DATE" \
            --end-date "$THROUGH_DATE" \
            --source starter_assignment_coverage \
            | tee "$schedule_summary_file"
          validate_summary "$schedule_summary_file" schedule

          echo "--- Backfilling verified pitcher ledgers ---"
          backfill_command=(
            python scripts/backfill_pitcher_game_logs.py
            --season "$SEASON"
            --through-date "$THROUGH_DATE"
            --source starter_assignment_coverage
            --apply
          )
          if [ -n "$PITCHER_MLB_ID" ]; then
            backfill_command+=(--pitcher-mlb-id "$PITCHER_MLB_ID")
          fi
          "${backfill_command[@]}" | tee "$backfill_summary_file"
          validate_summary "$backfill_summary_file" backfill
          echo "=== Production ledger backfill completed ==="

      - name: Run Phase 0H production snapshot audit
        if: ${{ inputs.operation == 'phase0h_snapshot_audit' }}
        working-directory: backend
        env:
          AUDIT_WINDOW: ${{ inputs.audit_window }}
          AUDIT_RECENT_ROW_LIMIT: ${{ inputs.audit_recent_row_limit }}
          AUDIT_OUTPUT_DIR: ${{ runner.temp }}/phase0h-snapshot-audit
        run: |
          set -euo pipefail
          mkdir -p "$AUDIT_OUTPUT_DIR"
          audit_json="$AUDIT_OUTPUT_DIR/phase0h-snapshot-audit.json"
          audit_stderr="$AUDIT_OUTPUT_DIR/phase0h-snapshot-audit.stderr.log"

          echo "=== Phase 0H production snapshot audit starting ==="
          set +e
          python scripts/run_internal_snapshot_audit.py \
            --window "$AUDIT_WINDOW" \
            --recent-row-limit "$AUDIT_RECENT_ROW_LIMIT" \
            --compact \
            > "$audit_json" \
            2> "$audit_stderr"
          audit_exit_code=$?
          set -e

          python - "$audit_json" "$audit_exit_code" "$GITHUB_STEP_SUMMARY" <<'PY'
          import json
          from pathlib import Path
          import sys

          audit_json = Path(sys.argv[1])
          audit_exit_code = int(sys.argv[2])
          summary_path = Path(sys.argv[3])

          def load_audit_payload(path):
              text = path.read_text(encoding='utf-8')
              try:
                  parsed = json.loads(text)
              except json.JSONDecodeError as exc:
                  last_error = exc
              else:
                  if isinstance(parsed, dict):
                      return parsed
                  raise ValueError('Audit output JSON was not an object.')

              decoder = json.JSONDecoder()
              lines = text.splitlines()
              for index in range(len(lines) - 1, -1, -1):
                  raw_line = lines[index]
                  if not raw_line.lstrip().startswith('{'):
                      continue
                  candidate = '\n'.join(lines[index:]).strip()
                  try:
                      parsed = json.loads(candidate)
                  except json.JSONDecodeError:
                      try:
                          parsed, _ = decoder.raw_decode(candidate)
                      except json.JSONDecodeError as exc:
                          last_error = exc
                          continue
                  if isinstance(parsed, dict):
                      return parsed
              raise ValueError(
                  f'No JSON audit object found in command output: {last_error}'
              )

          try:
              payload = load_audit_payload(audit_json)
          except ValueError as exc:
              summary_path.write_text(
                  '## Phase 0H Production Snapshot Audit\n\n'
                  f'- Exit code: `{audit_exit_code}`\n'
                  '- Result: invalid JSON output\n',
                  encoding='utf-8',
              )
              raise SystemExit(f'Audit output was not valid JSON: {exc}')

          adjacency = payload.get('snapshot_adjacency_summary') or {}
          request = payload.get('request') or {}
          latest = payload.get('latest_snapshot') or {}
          recent = payload.get('recent_snapshots') or []
          diagnostics = payload.get('diagnostics') or []

          count_fields = (
              'published_snapshot_count',
              'trusted_published_snapshot_count',
              'adjacent_published_pair_count',
              'trusted_pair_count',
              'comparable_adjacent_pair_count',
              'non_comparable_count',
              'non_adjacent_comparison_count',
          )
          errors = []
          if audit_exit_code != 0:
              errors.append(f'audit_exit_code={audit_exit_code}')
          if payload.get('route_status') != 'internal_admin_only':
              errors.append(f"route_status={payload.get('route_status')!r}")
          if payload.get('response_mode') == 'fallback_db_row_metadata':
              errors.append('top-level fallback response_mode observed')
          if adjacency.get('response_mode') != 'bounded_summary':
              errors.append(
                  'snapshot_adjacency_summary.response_mode='
                  f"{adjacency.get('response_mode')!r}"
              )
          if request.get('window_days') != 14:
              errors.append(f"request.window_days={request.get('window_days')!r}")
          if not latest:
              errors.append('latest_snapshot missing')
          if not isinstance(recent, list) or not recent:
              errors.append('recent_snapshots missing or empty')
          if adjacency.get('recent_rows_truncated') is not False:
              errors.append(
                  'recent_rows_truncated='
                  f"{adjacency.get('recent_rows_truncated')!r}"
              )
          if not isinstance(adjacency.get('recent_row_query_limit'), int):
              errors.append(
                  'recent_row_query_limit='
                  f"{adjacency.get('recent_row_query_limit')!r}"
              )
          for field in count_fields:
              if not isinstance(adjacency.get(field), int):
                  errors.append(f'{field}={adjacency.get(field)!r}')
          if not isinstance(adjacency.get('non_comparable_reason_codes'), list):
              errors.append(
                  'non_comparable_reason_codes='
                  f"{adjacency.get('non_comparable_reason_codes')!r}"
              )

          lines = [
              '## Phase 0H Production Snapshot Audit',
              '',
              f'- Exit code: `{audit_exit_code}`',
              f"- Route status: `{payload.get('route_status')}`",
              f"- Audit window: `{request.get('window_days')}`",
              f"- Latest snapshot date: `{latest.get('data_through')}`",
              f"- Latest snapshot id: `{latest.get('id')}`",
              f"- Published snapshots: `{adjacency.get('published_snapshot_count')}`",
              f"- Trusted published snapshots: `{adjacency.get('trusted_published_snapshot_count')}`",
              f"- Adjacent published pairs: `{adjacency.get('adjacent_published_pair_count')}`",
              f"- Trusted pairs: `{adjacency.get('trusted_pair_count')}`",
              f"- Comparable adjacent pairs: `{adjacency.get('comparable_adjacent_pair_count')}`",
              f"- Non-comparable count: `{adjacency.get('non_comparable_count')}`",
              f"- Non-comparable reason codes: `{adjacency.get('non_comparable_reason_codes')}`",
              f"- Non-adjacent comparison count: `{adjacency.get('non_adjacent_comparison_count')}`",
              f"- Recent row query limit: `{adjacency.get('recent_row_query_limit')}`",
              f"- Recent rows truncated: `{adjacency.get('recent_rows_truncated')}`",
              f"- Diagnostics count: `{len(diagnostics)}`",
          ]
          if errors:
              lines.extend(('', '### Validation Errors'))
              lines.extend(f'- `{error}`' for error in errors)
          else:
              lines.extend(('', 'Full bounded-summary production evidence captured.'))
          summary_path.write_text('\n'.join(lines) + '\n', encoding='utf-8')

          if errors:
              raise SystemExit(
                  'Phase 0H production audit did not produce ratification-ready '
                  f'bounded summary evidence: {errors}'
              )
          PY

          echo "=== Phase 0H production snapshot audit completed ==="

      - name: Upload Phase 0H audit artifact
        if: ${{ always() && inputs.operation == 'phase0h_snapshot_audit' }}
        uses: actions/upload-artifact@v4
        with:
          name: phase0h-snapshot-audit-${{ github.run_id }}
          path: ${{ runner.temp }}/phase0h-snapshot-audit/
          if-no-files-found: error
          retention-days: 14
